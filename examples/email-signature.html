<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Assinatura J3F — Template HTML para e-mail</title>
</head>
<body style="margin:0; padding:32px; font-family: Arial, Helvetica, sans-serif; background:#f5f5f5;">

<!--
  Assinatura de e-mail J3F 2026
  Compatível com Gmail, Outlook, Apple Mail.
  Fonte: usa Manrope quando disponível, com cascata para fontes de sistema.
  Logo: substituir o src abaixo pelo PNG hospedado (raw URL do repo recomendado).

  URL recomendada do logo (raw GitHub):
  https://raw.githubusercontent.com/fabiosilva-labclaw/j3f-design-system/main/logos/png/J3F_logo_primario_verde.png
-->

<table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color:#000000; max-width:520px;">
  <tr>
    <!-- Logo -->
    <td style="padding-right:24px; vertical-align:top; border-right:1px solid #96C9D7;">
      <img src="https://raw.githubusercontent.com/fabiosilva-labclaw/j3f-design-system/main/logos/png/J3F_logo_primario_verde.png"
           alt="J3F Consultoria | Tax Intelligence"
           width="120"
           style="display:block; max-width:120px; height:auto;">
    </td>

    <!-- Informações -->
    <td style="padding-left:24px; vertical-align:top;">
      <div style="font-size:15px; font-weight:600; color:#005263; line-height:1.3; margin-bottom:4px;">
        Fábio Garcia da Silva
      </div>
      <div style="font-size:13px; font-weight:400; color:#000000; line-height:1.4; margin-bottom:2px;">
        Sócio-fundador · OAB/SP 232.079
      </div>
      <div style="font-size:13px; font-weight:400; color:#999999; line-height:1.4; margin-bottom:16px;">
        J3F Consultoria | Tax Intelligence
      </div>

      <div style="font-size:12px; color:#000000; line-height:1.6;">
        <a href="mailto:fabio@j3f.com.br" style="color:#00ACCA; text-decoration:none;">fabio@j3f.com.br</a><br>
        <a href="https://j3f.com.br" style="color:#00ACCA; text-decoration:none;">j3f.com.br</a><br>
        São Paulo, SP
      </div>

      <div style="font-size:11px; color:#9E947E; line-height:1.4; margin-top:16px; font-style:italic;">
        Pagando o justo. Nem um centavo a mais.
      </div>
    </td>
  </tr>
</table>

<!--
  Variantes:
  - Para outros colaboradores, substituir Nome, Cargo, OAB e e-mail.
  - Para versões com app/celular, adicionar linha telefônica entre e-mail e cidade.
  - Para encerramento institucional, adicionar bloco LGPD/confidencialidade após a tagline (fonte 9pt, cor #999999).

  Não fazer:
  - Não trocar a cor da tagline para outra que não seja Cobre #9E947E
  - Não usar fontes serifadas
  - Não colocar logo do lado direito
  - Não adicionar ícones decorativos de redes sociais coloridos (apenas SVG monocromático Verde Escuro #005263, se necessário)
-->

</body>
</html>
